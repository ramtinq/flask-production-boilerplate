# =========================================================================
# GLOBAL MAPPINGS (Evaluated inside the Nginx http context)
# =========================================================================

# Preserves incoming TLS/HTTPS protocol markers from upstream cloud load balancers.
# If an upstream proxy passes an existing proto header, keep it; otherwise fall back to $scheme.
map $http_x_forwarded_proto $passed_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Handles WebSocket protocol upgrading seamlessly.
# Configures a dynamic connection status to allow persistent TCP upgrades when requested.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =========================================================================
# SERVER BLOCK CONFIGURATION
# =========================================================================

server {
    # Port 80 catch-all setup; handles both local deployment and external VPS domains natively
    listen 80 default_server;
    server_name _;

    # HARDENING: Strips precise Nginx version strings from error screens and response headers
    server_tokens off;

    # SECURITY HEADERS: Hardens browser-side protections against common web exploits
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # DOCKER RESILIENCE: Points to Docker's internal DNS core engine.
    # Prevents Nginx from locking onto old, dead container IPs when the Flask service restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logging configurations
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # SECURITY: Caps maximum payload upload size at 20MB (Prevents default 1MB restriction drops)
    client_max_body_size 20m;

    # GZIP PERFORMANCE: Compresses assets on-the-fly to slash loading latency and bandwidth usage.
    # The vary directive ensures intermediate proxies and CDNs cache compressed files correctly.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

    # HEALTHCHECK ENDPOINT: Lightweight tracking bypass for external uptime probes and load balancers
    location /health {
        access_log off; # Stops automated pings from cluttering production log files
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Custom graceful fallback layout handling for 502/503/504 errors if Flask crashes
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # STATIC ASSET OFFLOADING: Serves system assets directly from disk with aggressive 30-day caching
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # MAIN APPLICATION REVERSE PROXY ROUTING
    location / {
        # THE DEFERRED RESOLUTION TRICK: Using a variable string forces Nginx to look up
        # the container DNS at request time instead of crashing instantly if Flask is booting up late.
        set $backend_server http://web:5000;
        proxy_pass $backend_server;

        # Forces downstream connections to HTTP/1.1 (Required for keepalives and websockets)
        proxy_http_version 1.1;

        # Normalized identity and host location routing headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $passed_proto;

        # WebSocket and streaming channel translation bypasses
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Realistic connection timeout windows tailored for cloud architecture
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # TRAFFIC BUFFERING: Buffers upstream responses to protect Flask/Gunicorn workers
        # from slow downstream client connections, avoiding worker line stalls.
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}